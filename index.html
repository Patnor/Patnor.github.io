<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PNativeApps</title>
    <meta name="description" content="PNativeApps — apps coming soon." />
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg: #0b1020;
        --text: #eaeefb;
        --text-muted: #a7b0d0;
        --brand: #5b8cff;
        --brand-2: #8a5bff;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 600px at 80% -10%, #1a2350 0%, transparent 60%),
          radial-gradient(900px 500px at -10% 10%, #241a4d 0%, transparent 55%), var(--bg);
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
      }
      .logo {
        width: 84px;
        height: 84px;
        margin: 0 auto 24px;
        border-radius: 22px;
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        display: grid;
        place-items: center;
        font-weight: 900;
        font-size: 44px;
        color: #fff;
        box-shadow: 0 14px 40px rgba(91, 140, 255, 0.35);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 7vw, 3.5rem);
        background: linear-gradient(135deg, #fff, #b9c6ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        margin: 0;
        color: var(--text-muted);
        font-size: 1.15rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">P</div>
      <h1>PNativeApps</h1>
      <p>Apps coming soon.</p>
    </main>
  </body>
</html>
